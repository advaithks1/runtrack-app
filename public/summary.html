<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Make U Run - Run Summary</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />
</head>
<body class="home-body">
  <div class="mobile-app-shell">
    <div class="summary-screen">

      <!-- Top Bar -->
      <header class="top-bar">
        <div>
          <h2>Run Summary</h2>
          <p id="summaryUserText">Latest result</p>
        </div>
        <button class="small-btn" id="summaryBackHomeBtn" type="button">Home</button>
      </header>

      <!-- Status -->
      <section class="hero-card">
        <h3>Latest Run Status</h3>
        <p id="summaryStatus">Loading latest run...</p>
      </section>

      <!-- Summary Map -->
      <section class="map-card">
        <div class="section-head">
          <h3>Route Overview</h3>
          <span>Latest run</span>
        </div>
        <div id="summaryMap"></div>
      </section>

      <!-- Summary Stats -->
      <section class="stats-card">
        <div class="section-head">
          <h3>Run Stats</h3>
          <span>Saved result</span>
        </div>

        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-value" id="latestDistance">0.00</div>
            <div class="stat-label">KM</div>
          </div>

          <div class="stat-box">
            <div class="stat-value" id="latestTime">00:00</div>
            <div class="stat-label">TIME</div>
          </div>

          <div class="stat-box">
            <div class="stat-value" id="latestCalories">0</div>
            <div class="stat-label">CAL</div>
          </div>
        </div>
      </section>

      <!-- Pace -->
      <section class="stats-card">
        <div class="section-head">
          <h3>Average Pace</h3>
          <span>Per KM</span>
        </div>

        <div class="single-stat">
          <span id="latestPace">0.00 min/km</span>
        </div>
      </section>

      <!-- Actions -->
      <section class="action-stack">
        <button class="primary-btn" id="summaryRunAgainBtn" type="button">Run Again</button>

        <div class="action-row">
          <button class="secondary-btn half-btn" id="summaryGoHistoryBtn" type="button">
            View History
          </button>
          <button class="run-btn half-btn" id="summaryGoProfileBtn" type="button">
            Profile
          </button>
        </div>
      </section>

      <!-- Tip -->
      <section class="info-card">
        <h3>Great Work</h3>
        <p>
          Your latest run is saved successfully. You can start another run now or review your full running history.
        </p>
      </section>

      <!-- Bottom Nav -->
      <nav class="bottom-nav">
        <button class="nav-item" id="summaryNavHome" type="button">Home</button>
        <button class="nav-item active" id="summaryNavRun" type="button">Run</button>
        <button class="nav-item" id="summaryNavHistory" type="button">History</button>
        <button class="nav-item" id="summaryNavProfile" type="button">Profile</button>
      </nav>

    </div>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin=""
  ></script>

  <script src="js/summary.js"></script>
</body>
</html>
