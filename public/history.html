<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Make U Run - History</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="home-body">

  <div class="mobile-app-shell">
    <div class="history-screen">

      <header class="top-bar">
        <div>
          <h2>Run History</h2>
          <p id="historyUserText">Your saved runs</p>
        </div>
        <button class="small-btn" id="historyHomeBtn">Home</button>
      </header>

      <section class="stats-card">
        <div class="section-head">
          <h3>Summary</h3>
          <span>All time</span>
        </div>

        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-value" id="totalRuns">0</div>
            <div class="stat-label">RUNS</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="totalKm">0.00</div>
            <div class="stat-label">KM</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="totalCal">0</div>
            <div class="stat-label">CAL</div>
          </div>
        </div>
      </section>

      <section class="history-list-card">
        <div class="section-head">
          <h3>Recent Runs</h3>
          <span id="historyCount">0 items</span>
        </div>

        <div id="historyList" class="history-list">
          <p class="empty-text">No runs saved yet.</p>
        </div>
      </section>

      <nav class="bottom-nav">
        <button class="nav-item" id="historyNavHome">Home</button>
        <button class="nav-item" id="historyNavRun">Run</button>
        <button class="nav-item active" id="historyNavHistory">History</button>
        <button class="nav-item" id="historyNavProfile">Profile</button>
      </nav>

    </div>
  </div>

  <script src="js/history.js"></script>
</body>
</html>
