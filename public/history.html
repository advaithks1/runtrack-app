<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Make U Run - History</title>
  <meta name="theme-color" content="#0f172a" />

  <!-- ✅ Use absolute paths for deployed site -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="home-body">
  <div class="mobile-app-shell">
    <div class="history-screen">

      <!-- Top Bar -->
      <header class="top-bar">
        <div>
          <h2>Run History</h2>
          <p id="historyUserText">Your saved runs</p>
        </div>
        <button class="small-btn" id="historyBackHomeBtn" type="button">Home</button>
      </header>

      <!-- Status -->
      <section class="hero-card">
        <h3>History Status</h3>
        <p id="historyStatus">Loading your runs...</p>
      </section>

      <!-- History List -->
      <section class="history-list-card">
        <div class="section-head">
          <h3>Saved Runs</h3>
          <span>Recent first</span>
        </div>

        <div class="history-list" id="historyList">
          <p class="empty-text">Loading your runs...</p>
        </div>
      </section>

      <!-- Info -->
      <section class="info-card">
        <h3>Tip</h3>
        <p>
          You can review all saved runs here and delete any run you no longer want to keep.
        </p>
      </section>

      <!-- Bottom Nav -->
      <nav class="bottom-nav">
        <button class="nav-item" id="historyNavHome" type="button">Home</button>
        <button class="nav-item" id="historyNavRun" type="button">Run</button>
        <button class="nav-item active" id="historyNavHistory" type="button">History</button>
        <button class="nav-item" id="historyNavProfile" type="button">Profile</button>
      </nav>

    </div>
  </div>

  <!-- ✅ Use absolute path -->
  <script src="/js/history.js"></script>
</body>
</html>
